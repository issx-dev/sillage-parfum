name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-16 -qq
          sudo pg_ctlcluster 16 main start || sudo service postgresql start
          sudo -u postgres psql -c "CREATE DATABASE ci;" 2>/dev/null || true
          sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';" 2>/dev/null || true

      - name: Lint
        run: pnpm lint

      - name: Type-check (via build)
        run: pnpm build
        env:
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci
          UPSTASH_REDIS_REST_URL: https://ci.upstash.io
          UPSTASH_REDIS_REST_TOKEN: ci_placeholder

      - name: Test
        run: pnpm test
        env:
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci
          UPSTASH_REDIS_REST_URL: https://ci.upstash.io
          UPSTASH_REDIS_REST_TOKEN: ci_placeholder
